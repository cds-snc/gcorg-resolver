name: Terraform apply (prod)

on:
  push:
    branches:
      - main
    paths:
      - "infra/**"
      - "src/**"
      - "data/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/terraform-apply-prod.yml"
  workflow_run:
    workflows:
      - "Update reference data"
      - "Render READMEs to HTML"
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: terraform-apply-prod
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ca-central-1
  TF_INPUT: "false"
  TF_IN_AUTOMATION: "true"

jobs:
  apply:
    if: ${{ github.event_name == 'push' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Build Lambda zip
        run: bash infra/build_lambda.sh

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::${{ vars.SDR_AWS_ACCOUNT }}:role/gcorg-resolver-apply-prod
          role-session-name: TFApplyProd
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Terraform
        uses: cds-snc/terraform-tools-setup@v1
        env:
          TERRAFORM_VERSION: 1.14.8
      
      - name: Terraform init
        run: terraform -chdir=infra/env/prod init

      - name: Terraform apply
        run: terraform -chdir=infra/env/prod apply -auto-approve -input=false
