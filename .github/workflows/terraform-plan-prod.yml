name: Terraform plan (prod)

on:
  pull_request:
    branches:
      - main
    paths:
      - "infra/**"
      - "src/**"
      - "data/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/terraform-plan-prod.yml"
      - ".github/workflows/terraform-apply-prod.yml"

concurrency:
  group: terraform-prod-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  AWS_REGION: ca-central-1
  TF_INPUT: "false"
  TF_IN_AUTOMATION: "true"

jobs:
  plan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Build Lambda zip
        run: bash infra/build_lambda.sh

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: arn:aws:iam::${{ vars.SDR_AWS_ACCOUNT }}:role/gcorg-resolver-plan-prod
          role-session-name: TFPlanProd
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Terraform
        uses: cds-snc/terraform-tools-setup@v1
        env:
          TERRAFORM_VERSION: 1.14.8

      - name: Terraform plan
        uses: cds-snc/terraform-plan@v5
        with:
          directory: infra/env/prod
          github-token: ${{ secrets.GITHUB_TOKEN}}